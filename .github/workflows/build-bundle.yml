name: Build Price & Stock Bundle

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "price bundle mode"
        required: false
        type: choice
        default: encrypted
        options:
          - encrypted
          - plain
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PRICE_MODE: ${{ github.event.inputs.mode || 'encrypted' }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Debug env
        env:
          PRICE_SOURCE_URL: ${{ secrets.PRICE_SOURCE_URL }}
          STOCK_SOURCE_URL: ${{ secrets.STOCK_SOURCE_URL }}
          PRICE_MODE: ${{ github.event.inputs.mode || 'encrypted' }}
        run: |
          echo "PRICE_SOURCE_URL set? ${PRICE_SOURCE_URL:+yes}"
          echo "STOCK_SOURCE_URL set? ${STOCK_SOURCE_URL:+yes}"
          echo "PRICE_MODE=$PRICE_MODE"

      - name: Checkout data
        uses: actions/checkout@v4
        with:
          ref: data
          path: data

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generate bundle
        env:
          PRICE_SOURCE_URL: ${{ secrets.PRICE_SOURCE_URL }}
          STOCK_SOURCE_URL: ${{ secrets.STOCK_SOURCE_URL }}
          PRICE_BUNDLE_PASSWORD: ${{ secrets.PRICE_BUNDLE_PASSWORD }}
          PRICE_MODE: ${{ github.event.inputs.mode || 'encrypted' }}
        run: |
          if [ "$PRICE_MODE" = "encrypted" ] && [ -z "${PRICE_BUNDLE_PASSWORD}" ]; then
            echo "PRICE_BUNDLE_PASSWORD is required for encrypted price bundle"
            exit 1
          fi
          node tools/sync_price_bundle.mjs --mode "$PRICE_MODE"
          node tools/sync_stock_bundle.mjs

      - name: Commit data
        run: |
          cd data
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update price and stock bundles" || echo "No changes to commit"
          git push origin data