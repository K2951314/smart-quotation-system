name: Build Price & Stock Bundle

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "price bundle mode"
        required: false
        type: choice
        default: encrypted
        options:
          - encrypted
          - plain
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码分支 (main) 到根目录
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      # 2. 检出数据分支 (data) 到单独的文件夹 'data-branch'
      - name: Checkout Data Branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-branch

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      # 3. 运行生成脚本
      # 使用 --output 参数强制指定写入到 'data-branch' 的根目录
      - name: Generate Bundles
        env:
          PRICE_SOURCE_URL: ${{ secrets.PRICE_SOURCE_URL }}
          STOCK_SOURCE_URL: ${{ secrets.STOCK_SOURCE_URL }}
          PRICE_BUNDLE_PASSWORD: ${{ secrets.PRICE_BUNDLE_PASSWORD }}
          PRICE_MODE: ${{ github.event.inputs.mode || 'encrypted' }}
        run: |
          node tools/sync_price_bundle.mjs \
            --mode "$PRICE_MODE" \
            --output data-branch/price.bundle.js
            
          node tools/sync_stock_bundle.mjs \
            --output data-branch/stock.bundle.js

      # 4. 提交并推送数据到 data 分支
      - name: Deploy to Data Branch
        run: |
          cd data-branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 检查是否有文件变化
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: auto update bundles $(date +'%Y-%m-%d %H:%M')"
            git push origin data
          else
            echo "No changes to price or stock data. Skipping push."
          fi