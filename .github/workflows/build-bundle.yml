name: Build Price & Stock Bundle

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "price bundle mode"
        required: false
        type: choice
        default: encrypted
        options:
          - encrypted
          - plain
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PRICE_MODE: ${{ github.event.inputs.mode || 'encrypted' }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Debug env
        env:
          PRICE_SOURCE_URL: ${{ secrets.PRICE_SOURCE_URL }}
          STOCK_SOURCE_URL: ${{ secrets.STOCK_SOURCE_URL }}
          PRICE_MODE: ${{ github.event.inputs.mode || 'encrypted' }}
        run: |
          echo "PRICE_SOURCE_URL set? ${PRICE_SOURCE_URL:+yes}"
          echo "STOCK_SOURCE_URL set? ${STOCK_SOURCE_URL:+yes}"
          echo "PRICE_MODE=$PRICE_MODE"

      - name: Checkout data
        uses: actions/checkout@v4
        with:
          ref: data
          path: data

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generate bundle
        env:
          PRICE_SOURCE_URL: ${{ secrets.PRICE_SOURCE_URL }}
          STOCK_SOURCE_URL: ${{ secrets.STOCK_SOURCE_URL }}
          PRICE_BUNDLE_PASSWORD: ${{ secrets.PRICE_BUNDLE_PASSWORD }}
          PRICE_MODE: ${{ github.event.inputs.mode || 'encrypted' }}
        run: |
          if [ "$PRICE_MODE" = "encrypted" ] && [ -z "${PRICE_BUNDLE_PASSWORD}" ]; then
            echo "PRICE_BUNDLE_PASSWORD is required for encrypted price bundle"
            exit 1
          fi
          node tools/sync_price_bundle.mjs --mode "$PRICE_MODE"
          node tools/sync_stock_bundle.mjs

      - name: Generate hash
        id: hash
        run: |
          PRICE_HASH=$(md5sum price.bundle.js | cut -c1-8)
          STOCK_HASH=$(md5sum stock.bundle.js | cut -c1-8)

          echo "price=$PRICE_HASH" >> $GITHUB_OUTPUT
          echo "stock=$STOCK_HASH" >> $GITHUB_OUTPUT

      - name: Rename
        run: |
          mv price.bundle.js price.bundle.${{ steps.hash.outputs.price }}.js
          mv stock.bundle.js stock.bundle.${{ steps.hash.outputs.stock }}.js

      - name: Commit data
        run: |
          cd data
          git config user.name "bot"
          git config user.email "bot@example.com"

          rm -f *.bundle.*.js   # 🔥 防止堆积
          cp ../price.bundle.*.js .
          cp ../stock.bundle.*.js .

          git add .
          git commit -m "update bundle" || echo "no change"
          git push

      - name: Update index.html
        run: |
          sed -i "s|price.bundle.*.js|price.bundle.${{ steps.hash.outputs.price }}.js|g" apps/v9/index.html
          sed -i "s|stock.bundle.*.js|stock.bundle.${{ steps.hash.outputs.stock }}.js|g" apps/v9/index.html

      - name: Commit main
        run: |
          git config user.name "尘思"
          git config user.email "K2951314@163.com"

          git add apps/v9/index.html
          git commit -m "update bundle ref" || echo "no change"
          git push
