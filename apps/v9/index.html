<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f7f3ec">
<title>智能询价系统 v9</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="toast" class="toast" role="status" aria-live="polite">已复制</div>

<div class="shell">
  <header class="masthead">
    <div class="masthead-main">
      <div class="brand-line">
        <h1>智能询价系统 v9</h1>
        <div id="status" class="status-badge info">等待数据...</div>
      </div>
      <div id="versions" class="version-bar">价格版本: - | 库存版本: -</div>
    </div>
  </header>

  <section class="toolbar" aria-label="查询控制台">
    <div class="toolbar-actions">
      <button id="btnSearch" class="btn btn-search" onclick="doSearch()">智能查询</button>
      <button id="btnRegexConvert" class="btn btn-regex" onclick="doRegexSearchConverted()">库存查询</button>
      <button class="btn btn-mmc" type="button" onclick="openMmcLogin()">三菱库存</button>
      <button id="btnCopy" class="btn btn-copy" onclick="doCopy()">复制勾选</button>
    </div>

    <div class="toolbar-main">
      <div class="field-group field-group-large">
        <label for="discountStep">折扣步长</label>
        <div class="field-shell">
          <input type="number" id="discountStep" value="0.1" step="0.1" min="0.1" inputmode="decimal">
          <span class="field-unit">百分点</span>
        </div>
      </div>

      <div class="field-group">
        <label for="decimals">小数位数</label>
        <div class="field-shell">
          <input type="number" id="decimals" value="1" step="1" min="0" inputmode="numeric">
        </div>
      </div>

      <div class="field-group">
        <label for="threshold">取整阈值</label>
        <div class="field-shell">
          <input type="number" id="threshold" value="100" step="1" min="0" inputmode="numeric">
        </div>
      </div>
    </div>

    <div class="toolbar-secondary">
      <div class="toolbar-secondary-main">
        <div class="toolbar-control-band">
          <div class="step-presets toolbar-step-presets">
            <button type="button" class="step-preset is-active" data-step="0.1" onclick="setDiscountStepPreset(this)">0.1</button>
            <button type="button" class="step-preset" data-step="0.5" onclick="setDiscountStepPreset(this)">0.5</button>
            <button type="button" class="step-preset" data-step="1" onclick="setDiscountStepPreset(this)">1</button>
            <button id="btnDefaultDiscounts" type="button" class="step-preset step-preset-action" onclick="openDefaultDiscountConfig()">默认折扣</button>
            <div class="result-stat"><strong id="resultCount">0</strong><span>结果</span></div>
            <label class="select-all-toggle">
              <input id="toggleAllResults" type="checkbox" onchange="toggleAll(this)">
              <span>全选</span>
            </label>
          </div>
        </div>

        <div class="toolbar-copy toolbar-copy-inline">
          <label class="opt-lbl"><input type="checkbox" id="chk_code" checked>代码</label>
          <label class="opt-lbl"><input type="checkbox" id="chk_spec" checked>规格</label>
          <label class="opt-lbl"><input type="checkbox" id="chk_price" checked>报价</label>
          <label class="opt-lbl"><input type="checkbox" id="chk_special">特价</label>
          <label class="opt-lbl"><input type="checkbox" id="chk_stock">库存</label>
          <label class="opt-lbl is-accent"><input type="checkbox" id="chk_remark">备注</label>
        </div>
      </div>
    </div>
  </section>

  <main class="workspace">
    <section class="query-panel">
      <div class="section-head section-head-compact section-head-inline">
        <h2>输入</h2>
      </div>
      <textarea id="queryInput" class="query-input" placeholder="请输入规格型号...&#10;支持多关键词，例如：&#10;WNMG080408 UC5115"></textarea>
      <div class="query-note query-note-inline">
        <span>勾选项自动置顶</span>
      </div>
    </section>

    <section class="result-panel">
      <div class="result-panel-header">
        <div class="section-head section-head-compact section-head-inline">
          <h2>结果</h2>
        </div>
      </div>

      <div class="results-shell">
        <div id="resultBody" class="result-list" aria-live="polite"></div>
      </div>
    </section>
  </main>
</div>

<div id="defaultDiscountModal" class="discount-config-modal" hidden>
  <div class="discount-config-backdrop" onclick="closeDefaultDiscountConfig()"></div>
  <section class="discount-config-card" role="dialog" aria-modal="true" aria-labelledby="defaultDiscountTitle">
    <div class="discount-config-head">
      <div>
        <p class="discount-config-kicker">Default Discount</p>
        <h2 id="defaultDiscountTitle">默认折扣设置</h2>
      </div>
      <button type="button" class="discount-config-close" onclick="closeDefaultDiscountConfig()" aria-label="关闭">×</button>
    </div>

    <p class="discount-config-copy">按品牌或活动设置默认折扣。保存后，新查询结果会自动套用，未手动改过折扣的当前结果也会同步更新。</p>

    <div class="discount-config-grid">
      <label class="discount-config-field" for="defaultDiscountEx">
        <span>EX</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountEx" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
      <label class="discount-config-field" for="defaultDiscountOsg">
        <span>OSG</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountOsg" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
      <label class="discount-config-field" for="defaultDiscountMitsubishi">
        <span>三菱</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountMitsubishi" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
      <label class="discount-config-field" for="defaultDiscountOther">
        <span>其他</span>
        <div class="field-shell">
          <input type="number" id="defaultDiscountOther" min="0" max="100" step="0.1" inputmode="decimal">
          <span class="field-unit">%</span>
        </div>
      </label>
    </div>

    <div class="discount-config-actions">
      <button type="button" class="btn btn-ghost" onclick="resetDefaultDiscountConfig()">恢复默认</button>
      <button type="button" class="btn btn-ghost" onclick="closeDefaultDiscountConfig()">取消</button>
      <button type="button" class="btn btn-search" onclick="saveDefaultDiscountConfig()">保存</button>
    </div>
  </section>
</div>

<button id="btnBackToTop" class="mobile-back-top" type="button" onclick="scrollToTop()">回到顶部</button>

<script src="./lib/query-regex.js"></script>
<script src="./lib/discount-utils.js"></script>
<script src="./lib/result-sort.js"></script>
<script src="./lib/version-utils.js"></script>
<!-- 干干净净的主程序 -->
<script src="./app.js"></script>
</body>
</html>
